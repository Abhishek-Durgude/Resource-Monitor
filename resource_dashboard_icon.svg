<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="arc1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="none" stroke="rgba(148,163,184,0.15)" stroke-width="1.5"/>

  <!-- Subtle glow at top -->
  <ellipse cx="128" cy="60" rx="80" ry="50" fill="url(#glow)"/>

  <!-- Circuit dots (decorative) -->
  <circle cx="52" cy="52" r="3" fill="#5eead4" opacity="0.3"/>
  <circle cx="72" cy="42" r="2" fill="#60a5fa" opacity="0.25"/>
  <circle cx="42" cy="72" r="2" fill="#5eead4" opacity="0.2"/>
  <circle cx="204" cy="52" r="3" fill="#60a5fa" opacity="0.3"/>
  <circle cx="184" cy="42" r="2" fill="#5eead4" opacity="0.25"/>
  <circle cx="214" cy="72" r="2" fill="#60a5fa" opacity="0.2"/>
  <circle cx="52" cy="204" r="2" fill="#60a5fa" opacity="0.2"/>
  <circle cx="204" cy="204" r="2" fill="#5eead4" opacity="0.2"/>

  <!-- Gauge arc (main element) -->
  <g transform="translate(128, 148)" filter="url(#glow-filter)">
    <!-- Outer track -->
    <path d="M -62 0 A 62 62 0 0 1 62 0" fill="none" stroke="rgba(148,163,184,0.12)" stroke-width="10" stroke-linecap="round"/>
    <!-- Active arc (~75% fill) -->
    <path d="M -62 0 A 62 62 0 0 1 44 -44" fill="none" stroke="url(#arc1)" stroke-width="10" stroke-linecap="round"/>
    <!-- Needle -->
    <line x1="0" y1="0" x2="32" y2="-42" stroke="#e5eefc" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="#5eead4"/>
    <circle cx="0" cy="0" r="3" fill="#0b1020"/>
  </g>

  <!-- Mini bar charts (left side) -->
  <g transform="translate(38, 100)">
    <rect x="0" y="20" width="8" height="28" rx="3" fill="#5eead4" opacity="0.7"/>
    <rect x="12" y="10" width="8" height="38" rx="3" fill="#60a5fa" opacity="0.7"/>
    <rect x="24" y="25" width="8" height="23" rx="3" fill="#a78bfa" opacity="0.6"/>
  </g>

  <!-- Mini bar charts (right side) -->
  <g transform="translate(188, 100)">
    <rect x="0" y="15" width="8" height="33" rx="3" fill="#60a5fa" opacity="0.7"/>
    <rect x="12" y="8" width="8" height="40" rx="3" fill="#5eead4" opacity="0.7"/>
    <rect x="24" y="22" width="8" height="26" rx="3" fill="#fbbf24" opacity="0.6"/>
  </g>

  <!-- Pulse line (chart) at bottom -->
  <polyline points="48,200 68,192 88,196 108,184 128,188 148,178 168,182 188,174 208,180"
    fill="none" stroke="url(#pulse)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow-filter)" opacity="0.85"/>

  <!-- Small label circles below pulse -->
  <circle cx="88" cy="220" r="4" fill="#5eead4" opacity="0.5"/>
  <circle cx="108" cy="220" r="4" fill="#60a5fa" opacity="0.5"/>
  <circle cx="128" cy="220" r="4" fill="#fbbf24" opacity="0.5"/>
  <circle cx="148" cy="220" r="4" fill="#4ade80" opacity="0.5"/>
  <circle cx="168" cy="220" r="4" fill="#a78bfa" opacity="0.5"/>

  <!-- Top text "CPU · GPU · MEM" as decorative -->
  <text x="128" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#e5eefc" opacity="0.85" letter-spacing="3">MONITOR</text>
</svg>
